name: hire_direct
description: Hire Direct. Work Direct. - A two-sided service marketplaces.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  firebase_messaging: ^16.3.0
  flutter_riverpod: ^2.5.1
  go_router: ^17.3.0
  flutter_stripe: ^13.0.0
  pay: ^3.3.0
  stream_chat_flutter: ^10.0.1
  translator: ^1.0.0+1
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  photo_view: ^0.15.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fl_chart: ^1.2.0
  table_calendar: ^3.0.9
  intl: ^0.20.2
  google_fonts: ^8.1.0
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  dotted_border: ^3.1.0
  pinput: ^6.0.2
  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  connectivity_plus: ^7.1.1
  url_launcher: ^6.2.4
  path_provider: ^2.1.2
  permission_handler: ^12.0.3
  image_cropper: ^12.2.1
  timeago: ^3.6.0
  flutter_local_notifications: ^22.0.1
  dio: ^5.4.1
  equatable: ^2.0.5
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700